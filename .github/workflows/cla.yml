name: CLA Assistant

on:
  issue_comment:
    types: [created]
  pull_request_target:
    types: [opened, closed, synchronize]

permissions:
  contents: write
  pull-requests: write

jobs:
  cla_assistant:
    runs-on: ubuntu-latest
    # Only run on PRs, not all issue comments
    if: >
      (github.event.comment.body == 'recheck' ||
       github.event.comment.body == 'I have read the CLA Document and I hereby sign the CLA' ||
       github.event_name == 'pull_request_target')
    steps:
      - name: CLA Assistant
        uses: contributor-assistant/github-action@v2.6.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PERSONAL_ACCESS_TOKEN: ${{ secrets.CLA_TOKEN }}
        with:
          path-to-signatures: 'signatures/cla.json'
          path-to-document: 'https://github.com/hci-design-lab/a11y-logger/blob/main/CLA.md'
          branch: 'main'
          # Bots and the repo owner don't need to sign
          allowlist: bot*,dependabot[bot],MyLightIsOn
