name: CLA Assistant

on:
  issue_comment:
    types: [created]
  pull_request_target:
    types: [opened, closed, synchronize]

jobs:
  cla_assistant:
    runs-on: ubuntu-latest
    # Only run on PRs, not all issue comments
    if: >
      (github.event.comment.body == 'recheck' ||
       github.event.comment.body == 'I have read the CLA Document and I hereby sign the CLA' ||
       github.event_name == 'pull_request_target')
    steps:
      - name: CLA Assistant
        uses: contributor-assistant/github-action@v2.6.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PERSONAL_ACCESS_TOKEN: ${{ secrets.CLA_TOKEN }}
        with:
          # Create a file named cla-signatures.json with content [] and copy the Gist ID from the URL
          path-to-signatures: 'https://gist.github.com/bf84f88035cada9005177dfa61ad93db/cla-signatures.json'
          path-to-document: 'https://github.com/YOUR_ORG/a11y-pm/blob/main/CLA.md'
          branch: 'main'
          # Bots and the repo owner don't need to sign
          allowlist: bot*,dependabot[bot]
